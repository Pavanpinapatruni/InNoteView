[tox]
# Which environments to run by default when you run `tox` without any arguments
envlist = 
    py{39,310,311,312}
    lint
    typecheck

# Don't fail if a python version is not available, just skip it
skip_missing_interpreters = true

# Minimum tox version required to run this configuration
minversion = 4.0.0

# ============================================================
# DEFAULT TEST ENVIRONMENT
# Applied to py37, py38, py39, py310, py311, py312
# ============================================================
[testenv]
# Install the package with testing dependencies
deps =
    -r requirements_dev.txt

# Command to run each test environment
commands =
    pytest {posargs}

# ============================================================
# LINTING ENVIRONMENT
# Code style checks using flake8
# ============================================================
[testenv:lint]
# Skip installing the package itself (flake8 doesn't need it)
skip_install = true

deps =
    flake8>=5.0.0

# Command to run linting
commands =
    flake8 src/ tests/

# Override - lint only needs to run on Python version
basepython = python3

# ============================================================
# TYPE CHECKING ENVIRONMENT
# Static type checks using mypy
# ============================================================
[testenv:typecheck]
deps =
    mypy>=0.900

commands =
    mypy src/

# Override - type checking only needs to run on Python version
basepython = python3