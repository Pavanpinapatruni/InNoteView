# ============================================================
# InNoteView CI Pipeline
# Runs automatically on every push and pull request
# ============================================================
name: InNoteView CI

# ============================================================
# TRIGGERS: When should this workflow run?
# ============================================================
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ============================================================
# JOBS: What should this workflow do?
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1: Run unit tests across Python versions and OS
  # ----------------------------------------------------------
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    # Matrix strategy: test on multiple Python versions and OS
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the specified Python version
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt
          pip install -e .

      # Step 4: Run unit tests with pytest
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

  # ----------------------------------------------------------
  # JOB 2: Code quality checks (lint + type check)
  # ----------------------------------------------------------
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt
          pip install -e .

      # Step 4: Run flake8 linting
      - name: Lint with flake8
        run: |
          flake8 src/ tests/

      # Step 5: Run mypy type checking
      - name: Type check with mypy
        run: |
          mypy src/

  # ----------------------------------------------------------
  # JOB 3: Verify the package builds correctly
  # ----------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, quality]

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install build tools
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # Step 4: Build the package
      - name: Build package
        run: |
          python -m build

      # Step 5: Verify the built package
      - name: Check package with twine
        run: |
          twine check dist/*

      # Step 6: Upload build artifacts (for inspection)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/